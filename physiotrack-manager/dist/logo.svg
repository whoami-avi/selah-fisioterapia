<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <!-- Background -->
  <rect width="400" height="320" fill="#74A9C1"/>
  
  <!-- Decorative dots (left of Selah) -->
  <circle cx="145" cy="95" r="4" fill="white"/>
  <circle cx="150" cy="105" r="3" fill="white"/>
  <circle cx="155" cy="113" r="2" fill="white"/>
  
  <!-- Abstract symbol (human figure with upraised arms/budding plant) -->
  <g transform="translate(200, 55)">
    <!-- Partial circle around symbol -->
    <path d="M -30 45 A 40 40 0 0 1 30 45" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Central vertical line with circle (head/seed) -->
    <line x1="0" y1="10" x2="0" y2="35" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="5" r="5" fill="white"/>
    
    <!-- Left arm/leaf -->
    <path d="M 0 15 Q -15 5 -20 -5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Right arm/leaf -->
    <path d="M 0 15 Q 15 5 20 -5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Selah text (elegant script) -->
  <text x="200" y="175" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="56" 
        font-weight="normal"
        font-style="italic"
        fill="white" 
        text-anchor="middle"
        letter-spacing="2">Selah</text>
  
  <!-- Fisioterapia & Recovery text -->
  <text x="200" y="215" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="18" 
        font-weight="300"
        fill="#1A2B56" 
        text-anchor="middle"
        letter-spacing="3">FISIOTERAPIA &amp; RECOVERY</text>
</svg>