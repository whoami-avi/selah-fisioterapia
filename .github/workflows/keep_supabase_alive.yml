name: Keep Supabase Alive

# Mantiene activo el proyecto de Supabase del plan gratuito.
# Supabase pausa proyectos sin actividad después de 7 días.
# Corremos un ping cada 5 días para asegurar que siempre haya actividad.

on:
  schedule:
    # Cron: cada 5 días a las 12:00 UTC (07:00 hora de Colombia)
    # Formato: minute hour day-of-month month day-of-week
    - cron: '0 12 */5 * *'
  workflow_dispatch: # permite correrlo manualmente desde la UI de GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase client
        working-directory: physio-manager
        run: npm install @supabase/supabase-js --no-save

      - name: Ping Supabase
        working-directory: physio-manager
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node ping_supabase.js
